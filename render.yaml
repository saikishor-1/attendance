services:
  - type: web
    name: attendly-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --no-input"
    startCommand: "python manage.py migrate --no-input && gunicorn attendance_project.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: attendly-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
