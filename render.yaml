databases:
  - name: attendly-db
    databaseName: attendly
    user: attendly
    plan: free

services:
  - type: web
    name: attendly-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && gunicorn attendance_project.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: attendly-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
