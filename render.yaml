databases:
  - name: attendly-db
    databaseName: attendly
    user: attendly
    plan: free

services:
  - type: web
    name: attendly-backend
    env: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn attendance_project.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: attendly-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
